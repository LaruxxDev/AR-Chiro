<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene xr-mode-ui="XRMode: xr;" webxr="optionalFeatures: hit-test, local-floor; referenceSpaceType: local-floor" gesture-detector>
        <a-assets timeout="30000">
            <a-asset-item id="Chiro" src="Chiro.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 1.6 0"></a-camera>

        <a-entity
            gltf-model="#Chiro"
            position="0 -0.10 -1"
            rotation=" 0 0 0"
            scale="0.25 0.25 0.25"
            gesture-handler="rotationFactor: 1"
            animation-mixer="clip: *; loop: repeat"
        ></a-entity>
    
</body>
</html>
